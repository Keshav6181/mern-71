<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #ed37b0;
      }
      .container {
        width: 1200px;
        height: 600px;
        margin: auto;
        margin-top: 100px;
        background-color: #fffeff;

        display: grid;
        grid-template-columns: repeat(12, 1fr);
        grid-template-rows: repeat(6, 1fr);
        grid-gap: 15px;
        grid-template-areas:
          "i12 i12 i12 i12 i12 i12 i12 i12 i12 i12 i12 i12"
          "i6 i6 i6 i6 i6 i6 i7 i7 i7 i7 i7 i7"
          "i4 i4 i4 i4 i42 i42 i42 i42 i43 i43 i43 i43"
          "i3 i3 i3 i32 i32 i32 i33 i33 i33 i34 i34 i34"
          "i2 i2 i22 i22 i23 i23 i24 i24 i25 i25 i26 i26"
          "i1 i10 i13 i14 i15 i16 i17 i18 i19 i20 i21 i11";
      }
      .item {
        border: 5px solid rgb(255, 255, 255);
        background-color: #128cc5;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .item1 {
        grid-area: i12;
      }
      .item2 {
        grid-area: i6;
      }
      .item22 {
        grid-area: i7;
      }
      .item3 {
        grid-area: i4;
      }
      .item32 {
        grid-area: i42;
      }
      .item33 {
        grid-area: i43;
      }
      .item4 {
        grid-area: i3;
      }
      .item42 {
        grid-area: i32;
      }
      .item43 {
        grid-area: i33;
      }
      .item44 {
        grid-area: i34;
      }
      .item5 {
        grid-area: i2;
      }
      .item52 {
        grid-area: i22;
      }
      .item53 {
        grid-area: i23;
      }
      .item54 {
        grid-area: i24;
      }
      .item55 {
        grid-area: i25;
      }
      .item56 {
        grid-area: i26;
      }
      .item6 {
        grid-area: i1;
      }
      .item62 {
        grid-area: i10;
      }
      .item63 {
        grid-area: i13;
      }
      .item64 {
        grid-area: i14;
      }
      .item65 {
        grid-area: i15;
      }
      .item66 {
        grid-area: i16;
      }
      .item67 {
        grid-area: i17;
      }
      .item68 {
        grid-area: i18;
      }
      .item69 {
        grid-area: i19;
      }
      .item70 {
        grid-area: i20;
      }
      .item71 {
        grid-area: i21;
      }
      .item72 {
        grid-area: i11;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="item item1">12</div>
      <div class="item item2">6</div>
      <div class="item item22">6</div>
      <div class="item item3">4</div>
      <div class="item item32">4</div>
      <div class="item item33">4</div>
      <div class="item item4">3</div>
      <div class="item item42">3</div>
      <div class="item item43">3</div>
      <div class="item item44">3</div>
      <div class="item item5">2</div>
      <div class="item item52">2</div>
      <div class="item item53">2</div>
      <div class="item item54">2</div>
      <div class="item item55">2</div>
      <div class="item item56">2</div>
      <div class="item item6">1</div>
      <div class="item item62">1</div>
      <div class="item item63">1</div>
      <div class="item item64">1</div>
      <div class="item item65">1</div>
      <div class="item item66">1</div>
      <div class="item item67">1</div>
      <div class="item item68">1</div>
      <div class="item item69">1</div>
      <div class="item item70">1</div>
      <div class="item item71">1</div>
      <div class="item item72">1</div>
    </div>
  </body>
</html>
